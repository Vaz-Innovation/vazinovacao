version: "3.9"

services:
  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_DATABASE: wordpress
      MYSQL_USER: wordpress
      MYSQL_PASSWORD: wordpress
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - wp_network

  wordpress:
    build: ./docker/wordpress
    restart: always
    depends_on:
      - db
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      MYSQL_ROOT_PASSWORD: root
      WORDPRESS_CONFIG_EXTRA: |
        define('GRAPHQL_DEBUG', true);
        define('WP_ENVIRONMENT_TYPE', 'local');
        define('GRAPHQL_JWT_AUTH_SECRET_KEY', '(t`jl0mh~nuI1|+YfC<0BcLIpf?^V|tIB$uOxkpE~TDMnQRddy[:LbCoZkhDpbux');
    volumes:
      - wp_data:/var/www/html
    networks:
      - wp_network

  nginx:
    image: nginx:latest
    restart: always
    depends_on:
      - wordpress
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - wp_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    restart: always
    depends_on:
      - db
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    networks:
      - wp_network

volumes:
  db_data:
  wp_data:

networks:
  wp_network: